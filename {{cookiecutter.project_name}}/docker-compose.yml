version: '3.9'

services:
  db:
    image: postgres:14
    container_name: postgres
    restart: always
    ports:
      - '5432:5432'
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - web

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    restart: always
    ports:
      - '5050:80'
    env_file:
      - .env
    depends_on:
      - db
  
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: django-web
    command: >
      sh -c 'python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             python manage.py runserver 0.0.0.0:8000'
    restart: always
    ports:
      - '8000:8000'
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - db
    networks:
      - web
  {%- if cookiecutter.use_celery == 'y' %}

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A {{cookiecutter.project_slug}} worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - web
    networks:
      - web

  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A {{cookiecutter.project_slug}} beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - web
    networks:
      - web

  flower:
    image: mher/flower
    command: celery -A {{cookiecutter.project_slug}} flower
    ports:
      - '5555:5555'
    depends_on:
      - celery-worker
    networks:
      - web
  {%- endif %}

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - '8070:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/certs:/etc/nginx/certs
    depends_on:
      - web
    networks:
      - web

  {%- if cookiecutter.use_minio == 'y' %}
  minio:
    image: minio/minio
    container_name: minio
    restart: always
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    command: server /data --console-address :9001
    networks:
      - web
  {%- endif %}

volumes:
  postgres_data:
  minio_data:

networks:
  web:
